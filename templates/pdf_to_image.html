{% extends "base.html" %}

{% block title %}PDF to Image{% endblock %}

{% block content %}

<section class="tool-page">

<h1>PDF to Image</h1>

<p>Convert each page of your PDF into images.</p>

<form action="/pdf-to-image" method="POST" enctype="multipart/form-data">

<div class="upload-area">

<input type="file" name="file" accept=".pdf" required>

<p>or drop PDF here</p>

</div>

<button class="main-btn">
Download Converted Pdf to Images
</button>

</form>

</section>

{% endblock %}
