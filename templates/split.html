{% extends "base.html" %}

{% block title %}Split PDF{% endblock %}

{% block content %}

<section class="tool-page">

<h1>Split PDF</h1>

<p>Separate one page or a whole set for easy conversion.</p>

<form action="/split" method="POST" enctype="multipart/form-data">

<div class="upload-area">

<input type="file" name="file" required>

<p>or drop PDF here</p>

</div>

<button class="main-btn">
Download Split PDF
</button>

</form>

</section>

{% endblock %}
